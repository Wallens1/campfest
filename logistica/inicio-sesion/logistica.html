<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logística · Camp Fest 2026</title>
<link rel="stylesheet" href="../assets/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<!-- ===== PANTALLA DE LOGIN ===== -->

<div id="pantallaLogin">
    <div class="tarjeta">
        <div class="encabezado-login">
            <span class="eyebrow">Camp Fest 2026</span>
            <h1>Acceso Logística</h1>
        </div>

        <form id="formLogin">
            <div class="campo">
                <label for="email">Correo</label>
                <input type="email" id="email" autocomplete="username" required>
            </div>
            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" id="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="boton" id="botonLogin">Ingresar</button>
        </form>

        <div class="mensaje" id="mensajeLogin"></div>
    </div>
</div>

<!-- ===== PANEL PRINCIPAL ===== -->

<div id="pantallaPanel" class="oculto">

    <div class="barra-superior">
        <div class="marca">Camp Fest · Logística</div>
        <div>
            <span class="usuario-actual" id="nombreUsuarioActual"></span>
            &nbsp;·&nbsp;
            <button class="boton pequeno secundario" id="botonCerrarSesion">Cerrar sesión</button>
        </div>
    </div>

    <div class="tabs-busqueda">
        <div class="tab-busqueda activo" data-tipo="codigo">Código</div>
        <div class="tab-busqueda" data-tipo="documento">Documento</div>
        <div class="tab-busqueda" data-tipo="nombre">Nombre</div>
    </div>

    <div class="buscador">
        <input type="text" id="inputBusqueda" placeholder="Ingresa el código enviado por WhatsApp">
        <button class="boton pequeno" id="botonBuscar" style="width:auto;">Buscar</button>
    </div>

    <div class="mensaje" id="mensajeBusqueda"></div>

    <div class="resultados oculto" id="contenedorResultados"></div>

    <div class="ficha oculto" id="fichaParticipante"></div>

</div>

<script src="../scripts/logistica.js"></script>

</body>
</html>
